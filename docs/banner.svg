<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 640" width="1280" height="640" font-family="-apple-system, 'SF Pro Display', 'Inter', system-ui, sans-serif">
  <defs>
    <radialGradient id="bg" cx="30%" cy="50%" r="85%">
      <stop offset="0%" stop-color="#1e2a4a"/>
      <stop offset="70%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0d1428"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- subtle texture dots -->
  <g fill="#ffffff" fill-opacity="0.025">
    <circle cx="120" cy="80" r="1"/><circle cx="300" cy="120" r="1"/><circle cx="520" cy="60" r="1"/>
    <circle cx="780" cy="100" r="1"/><circle cx="960" cy="160" r="1"/><circle cx="1180" cy="80" r="1"/>
    <circle cx="200" cy="560" r="1"/><circle cx="420" cy="600" r="1"/><circle cx="640" cy="540" r="1"/>
    <circle cx="880" cy="580" r="1"/><circle cx="1080" cy="520" r="1"/><circle cx="1220" cy="600" r="1"/>
  </g>

  <!-- Ring captured from the running app -->
  <image xlink:href="ring-capture.png" x="40" y="30" width="580" height="580"/>

  <!-- Title + taglines -->
  <g transform="translate(680, 250)">
    <text x="0" y="0" fill="#eee" font-size="56" font-weight="800" letter-spacing="-1">beats<tspan fill="#e94560">.</tspan>bitwrap<tspan fill="#e94560">.</tspan>io</text>
    <text x="2" y="38" fill="#8af" font-size="20" font-weight="500" letter-spacing="0.5">deterministic beats via petri nets</text>
    <text x="2" y="78" fill="#888" font-size="14" letter-spacing="0.3">no AI · no LLMs · just math, music theory, and token flow</text>

    <g transform="translate(0, 130)" font-size="13" fill="#aaa">
      <text x="0" y="0">every note is a transition firing</text>
      <text x="0" y="22">every rhythm is tokens circulating through places</text>
      <text x="0" y="44">every track is a euclidean ring</text>
    </g>
  </g>

  <text x="1240" y="612" text-anchor="end" fill="#556" font-size="12" letter-spacing="1">beats.bitwrap.io</text>
</svg>
