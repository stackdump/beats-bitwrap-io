name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  bazel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Installs the Bazel version pinned in .bazelversion (via bazelisk)
      # and sets up repository/disk caching keyed on the lockfile so
      # external deps and build outputs persist across runs.
      - uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true

      # Fail if BUILD.bazel files have drifted from the Go sources —
      # i.e. someone added/removed a package or import without re-running
      # gazelle. -mode=diff prints the patch and exits non-zero on drift.
      - name: Check BUILD files are up to date (gazelle)
        run: bazel run //:gazelle -- -mode=diff

      - name: Build
        run: bazel build //...

      # --test_output=errors surfaces failing test logs inline.
      # Includes the Go package tests and the //scripts:cohesion_parity_test
      # nodejs_test that asserts JS/Go generator parity on the pinned fixture.
      - name: Test
        run: bazel test //... --test_output=errors
