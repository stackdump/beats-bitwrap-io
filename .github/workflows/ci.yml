name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # go-pflow is consumed via a local `replace => ../go-pflow` in go.mod,
  # so the job lays it out as a sibling checkout at this pinned commit.
  # Single source of truth — bump here when adopting new go-pflow (keep in
  # step with the ../go-pflow you build against locally).
  GO_PFLOW_REF: 49db35341b58526951d748936cf0750ce3bf21be

jobs:
  bazel:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: beats-bitwrap-io
    steps:
      # beats consumes go-pflow via a local `replace => ../go-pflow` in
      # go.mod, which Bazel's go_deps resolves as a filesystem path. CI
      # must therefore lay both repos out as siblings under the workspace
      # so `../go-pflow` resolves the same way it does on a dev machine.
      - name: Checkout beats-bitwrap-io
        uses: actions/checkout@v6
        with:
          path: beats-bitwrap-io

      - name: Checkout go-pflow (sibling dependency)
        uses: actions/checkout@v6
        with:
          repository: pflow-xyz/go-pflow
          ref: ${{ env.GO_PFLOW_REF }}
          path: go-pflow

      # internal/midiout pulls gomidi's rtmidi driver, which is cgo and
      # #includes <alsa/asoundlib.h>. Provide the ALSA dev headers so the
      # rtmidi C++ source compiles under Bazel's GoCompilePkg.
      - name: Install ALSA dev headers (rtmidi cgo dep)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      # Installs the Bazel version pinned in .bazelversion (via bazelisk)
      # and sets up repository/disk caching keyed on the lockfile so
      # external deps and build outputs persist across runs.
      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true

      # Wire the shared bazel-remote cache (bazel.stackdump.com) the same way
      # a dev machine does: write its basic-auth creds to ~/.netrc, which the
      # `--config=remote` block in .bazelrc reads. Sets BAZEL_REMOTE for later
      # steps. Security:
      #   - push (trusted)        -> read + upload results (populates the cache)
      #   - pull_request          -> read-only, so untrusted code can't poison it
      #   - no secret (fork PR)   -> skip remote entirely; plain local build
      # --remote_local_fallback in .bazelrc means a cache outage never fails CI.
      - name: Configure Bazel remote cache
        env:
          CACHE_USER: ${{ secrets.BAZEL_REMOTE_CACHE_USERNAME }}
          CACHE_PASSWORD: ${{ secrets.BAZEL_REMOTE_CACHE_PASSWORD }}
        run: |
          if [ -z "$CACHE_PASSWORD" ]; then
            echo "No remote-cache secret available — building without --config=remote."
            echo "BAZEL_REMOTE=" >> "$GITHUB_ENV"
            exit 0
          fi
          umask 077
          cat > "$HOME/.netrc" <<EOF
          machine bazel.stackdump.com
          login $CACHE_USER
          password $CACHE_PASSWORD
          EOF
          FLAGS="--config=remote"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FLAGS="$FLAGS --noremote_upload_local_results"
            echo "pull_request build: remote cache is read-only."
          else
            echo "push build: remote cache read + write."
          fi
          echo "BAZEL_REMOTE=$FLAGS" >> "$GITHUB_ENV"

      # Fail if BUILD.bazel files have drifted from the Go sources —
      # i.e. someone added/removed a package or import without re-running
      # gazelle. -mode=diff prints the patch and exits non-zero on drift.
      - name: Check BUILD files are up to date (gazelle)
        run: bazel run //:gazelle -- -mode=diff

      - name: Build
        run: bazel build //... $BAZEL_REMOTE

      # --test_output=errors surfaces failing test logs inline.
      # Includes the Go package tests and the //scripts:cohesion_parity_test
      # nodejs_test that asserts JS/Go generator parity on the pinned fixture.
      # NOTE: the headless macro->audio suite is intentionally NOT run here
      # (browser/realtime-bound). Run it on demand with
      # scripts/run-audio-tests.sh.
      - name: Test
        run: bazel test //... --test_output=errors $BAZEL_REMOTE
