<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1100" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="52%" r="75%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>
    <radialGradient id="webmGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="1"/>
      <stop offset="60%" stop-color="#b45309" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#92400e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="jsonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fde68a" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#a16207" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#713f12" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cidBond" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fde68a" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#67e8f9" stop-opacity="1"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.45"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#e2e8f0"/>
    </marker>
    <marker id="arrowGuard" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#ec4899" opacity="0.9"/>
    </marker>
    <marker id="arrowRebuild" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#a78bfa" opacity="0.9"/>
    </marker>
    <style>
      .title { font-size: 26px; font-weight: 600; fill: #e2e8f0; letter-spacing: 1px; }
      .sub   { font-size: 13px; fill: #94a3b8; letter-spacing: 0.4px; }
      .branch { font-size: 17px; font-weight: 600; fill: #f8fafc; }
      .branchsub { font-size: 11px; fill: #cbd5e1; }
      .leaf  { font-size: 11px; fill: #e2e8f0; }
      .legend { font-size: 12px; fill: #cbd5e1; }
      .legendh { font-size: 13px; font-weight: 600; fill: #f8fafc; }
      .axis  { stroke: #334155; stroke-width: 1; stroke-dasharray: 2 4; opacity: 0.4; }
      .spoke { stroke: #475569; stroke-width: 1.5; opacity: 0.65; fill: none; }
    </style>
  </defs>

  <!-- backdrop -->
  <rect width="1600" height="1100" fill="url(#bg)"/>

  <!-- header -->
  <text x="40" y="50" class="title">beats-bitwrap-io · anatomy of a .webm</text>
  <text x="40" y="72" class="sub">a sealed audio object addressed by CID; container × codec × source × capture × lifecycle × distribution. dual to the JSON share envelope under the same CID.</text>

  <!-- guide circles around the WebM hub -->
  <circle cx="980" cy="600" r="170" fill="none" class="axis"/>
  <circle cx="980" cy="600" r="320" fill="none" class="axis"/>

  <!-- ======= CID BOND (between the two duals) ======= -->
  <g>
    <!-- thick gradient bond connecting the two -->
    <line x1="370" y1="290" x2="908" y2="552" stroke="url(#cidBond)" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
    <line x1="370" y1="290" x2="908" y2="552" stroke="#67e8f9" stroke-width="1.5" stroke-dasharray="6 5" opacity="0.85"/>
    <!-- bond label set on the diagonal -->
    <text x="640" y="395" font-size="13" fill="#a5f3fc" font-weight="600" letter-spacing="0.5px"
          transform="rotate(26.5 640 395)">same CID · base58btc(CIDv1(dag-json, sha256))</text>
  </g>

  <!-- ======= DUAL · JSON ENVELOPE (upper-left peer) ======= -->
  <g>
    <circle cx="350" cy="270" r="92" fill="url(#jsonGlow)" filter="url(#soft)"/>
    <circle cx="350" cy="270" r="56" fill="#a16207" stroke="#fde68a" stroke-width="2.5" filter="url(#shadow)"/>
    <text x="350" y="266" text-anchor="middle" font-size="14" font-weight="700" fill="#fffbeb">/o/{cid}</text>
    <text x="350" y="282" text-anchor="middle" font-size="9" fill="#fde68a">canonical JSON</text>

    <g font-size="11" fill="#fef3c7">
      <rect x="60"  y="120" width="180" height="22" rx="11" fill="#422006" stroke="#fbbf24"/>
      <text x="150" y="135" text-anchor="middle">@type: BeatsShare · v: 1</text>
      <rect x="60"  y="148" width="180" height="22" rx="11" fill="#422006" stroke="#fbbf24"/>
      <text x="150" y="163" text-anchor="middle">genre · seed · tempo · fx</text>
      <rect x="60"  y="176" width="180" height="22" rx="11" fill="#422006" stroke="#fbbf24"/>
      <text x="150" y="191" text-anchor="middle">macrosDisabled · autoDj</text>
      <rect x="60"  y="204" width="180" height="22" rx="11" fill="#422006" stroke="#fbbf24"/>
      <text x="150" y="219" text-anchor="middle">~1 kB · regenerable recipe</text>
      <rect x="60"  y="380" width="180" height="22" rx="11" fill="#422006" stroke="#fbbf24"/>
      <text x="150" y="395" text-anchor="middle">PUT /o/{cid}</text>
      <rect x="60"  y="408" width="180" height="22" rx="11" fill="#422006" stroke="#fbbf24"/>
      <text x="150" y="423" text-anchor="middle">first-write-wins (immutable)</text>
    </g>
  </g>

  <!-- ======= CENTER · audio.webm (six-branch hub) ======= -->
  <circle cx="980" cy="600" r="100" fill="url(#webmGlow)" filter="url(#soft)"/>
  <circle cx="980" cy="600" r="58" fill="#b45309" stroke="#fbbf24" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="980" y="596" text-anchor="middle" font-size="18" font-weight="700" fill="#fffbeb">{cid}.webm</text>
  <text x="980" y="614" text-anchor="middle" font-size="10" fill="#fde68a">sealed audio dual</text>

  <!-- ======= SPOKES from WebM to its 6 branches ======= -->
  <g class="spoke">
    <line x1="980" y1="600" x2="980"  y2="320"/>   <!-- Container top -->
    <line x1="980" y1="600" x2="1180" y2="430"/>   <!-- Codec ur -->
    <line x1="980" y1="600" x2="1245" y2="600"/>   <!-- Source r -->
    <line x1="980" y1="600" x2="1180" y2="775"/>   <!-- Capture lr -->
    <line x1="980" y1="600" x2="980"  y2="880"/>   <!-- Lifecycle bottom -->
    <line x1="980" y1="600" x2="780"  y2="775"/>   <!-- Distribution ll -->
  </g>

  <!-- ======= A · CONTAINER (top) ======= -->
  <g>
    <rect x="885" y="290" width="190" height="54" rx="12" fill="#1e3a8a" stroke="#60a5fa" stroke-width="2" filter="url(#shadow)"/>
    <text x="980" y="317" text-anchor="middle" class="branch">Container</text>
    <text x="980" y="333" text-anchor="middle" class="branchsub">WebM · EBML envelope</text>

    <g font-size="11" fill="#dbeafe">
      <rect x="640"  y="170" width="160" height="22" rx="11" fill="#172554" stroke="#60a5fa"/>
      <text x="720"  y="185" text-anchor="middle">audio/webm MIME</text>
      <rect x="810"  y="170" width="160" height="22" rx="11" fill="#172554" stroke="#60a5fa"/>
      <text x="890"  y="185" text-anchor="middle">EBML header</text>
      <rect x="980"  y="170" width="160" height="22" rx="11" fill="#172554" stroke="#60a5fa"/>
      <text x="1060" y="185" text-anchor="middle">Matroska tracks</text>
      <rect x="1150" y="170" width="180" height="22" rx="11" fill="#172554" stroke="#60a5fa"/>
      <text x="1240" y="185" text-anchor="middle">CodecID: A_OPUS</text>
      <rect x="640"  y="200" width="160" height="22" rx="11" fill="#172554" stroke="#60a5fa"/>
      <text x="720"  y="215" text-anchor="middle">SimpleBlock frames</text>
      <rect x="810"  y="200" width="180" height="22" rx="11" fill="#172554" stroke="#60a5fa"/>
      <text x="900"  y="215" text-anchor="middle">streaming · no seek index</text>
      <rect x="1000" y="200" width="200" height="22" rx="11" fill="#172554" stroke="#60a5fa"/>
      <text x="1100" y="215" text-anchor="middle">duration written at finalize</text>
    </g>
  </g>

  <!-- ======= B · CODEC (upper-right) ======= -->
  <g>
    <rect x="1090" y="403" width="180" height="54" rx="12" fill="#3f6212" stroke="#a3e635" stroke-width="2" filter="url(#shadow)"/>
    <text x="1180" y="430" text-anchor="middle" class="branch">Codec</text>
    <text x="1180" y="446" text-anchor="middle" class="branchsub">Opus (lossy)</text>

    <g font-size="11" fill="#ecfccb">
      <rect x="1310" y="290" width="160" height="22" rx="11" fill="#1a2e05" stroke="#84cc16"/>
      <text x="1390" y="305" text-anchor="middle">48 kHz sample rate</text>
      <rect x="1310" y="320" width="160" height="22" rx="11" fill="#1a2e05" stroke="#84cc16"/>
      <text x="1390" y="335" text-anchor="middle">stereo · 2 channels</text>
      <rect x="1310" y="350" width="160" height="22" rx="11" fill="#1a2e05" stroke="#84cc16"/>
      <text x="1390" y="365" text-anchor="middle">~96–128 kbps VBR</text>
      <rect x="1310" y="380" width="160" height="22" rx="11" fill="#1a2e05" stroke="#84cc16"/>
      <text x="1390" y="395" text-anchor="middle">20 ms frames</text>
      <rect x="1310" y="410" width="160" height="22" rx="11" fill="#1a2e05" stroke="#84cc16"/>
      <text x="1390" y="425" text-anchor="middle">CELT/SILK hybrid</text>
      <rect x="1310" y="440" width="160" height="22" rx="11" fill="#1a2e05" stroke="#84cc16"/>
      <text x="1390" y="455" text-anchor="middle">MediaRecorder defaults</text>
    </g>
    <line x1="1270" y1="430" x2="1310" y2="375" class="spoke"/>
  </g>

  <!-- ======= C · SOURCE BUS (right) ======= -->
  <g>
    <rect x="1145" y="573" width="200" height="54" rx="12" fill="#92400e" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
    <text x="1245" y="600" text-anchor="middle" class="branch">Source bus</text>
    <text x="1245" y="616" text-anchor="middle" class="branchsub">Tone.getDestination()</text>

    <g font-size="11" fill="#fef3c7">
      <rect x="1380" y="510" width="160" height="22" rx="11" fill="#451a03" stroke="#f59e0b"/>
      <text x="1460" y="525" text-anchor="middle">per-track PolySynth</text>
      <rect x="1380" y="540" width="160" height="22" rx="11" fill="#451a03" stroke="#f59e0b"/>
      <text x="1460" y="555" text-anchor="middle">channel pan / gain</text>
      <rect x="1380" y="570" width="160" height="22" rx="11" fill="#451a03" stroke="#f59e0b"/>
      <text x="1460" y="585" text-anchor="middle">HP / LP filters</text>
      <rect x="1380" y="600" width="160" height="22" rx="11" fill="#451a03" stroke="#f59e0b"/>
      <text x="1460" y="615" text-anchor="middle">master Reverb / Delay</text>
      <rect x="1380" y="630" width="160" height="22" rx="11" fill="#451a03" stroke="#f59e0b"/>
      <text x="1460" y="645" text-anchor="middle">master Phaser</text>
      <rect x="1380" y="660" width="160" height="22" rx="11" fill="#451a03" stroke="#f59e0b"/>
      <text x="1460" y="675" text-anchor="middle">bus Compressor</text>
      <rect x="1380" y="690" width="160" height="22" rx="11" fill="#451a03" stroke="#f59e0b"/>
      <text x="1460" y="705" text-anchor="middle">bit-crusher (opt)</text>
      <rect x="1320" y="722" width="220" height="22" rx="11" fill="#451a03" stroke="#f59e0b"/>
      <text x="1430" y="737" text-anchor="middle">→ MediaStreamDestination</text>
    </g>
    <line x1="1345" y1="600" x2="1380" y2="600" class="spoke"/>
  </g>

  <!-- ======= D · CAPTURE (lower-right) ======= -->
  <g>
    <rect x="1090" y="748" width="180" height="54" rx="12" fill="#831843" stroke="#ec4899" stroke-width="2" filter="url(#shadow)"/>
    <text x="1180" y="775" text-anchor="middle" class="branch">Capture</text>
    <text x="1180" y="791" text-anchor="middle" class="branchsub">chromedp + MediaRecorder</text>

    <g font-size="11" fill="#fbcfe8">
      <rect x="1300" y="800" width="160" height="22" rx="11" fill="#4a044e" stroke="#ec4899"/>
      <text x="1380" y="815" text-anchor="middle">headless Chrome tab</text>
      <rect x="1470" y="800" width="120" height="22" rx="11" fill="#4a044e" stroke="#ec4899"/>
      <text x="1530" y="815" text-anchor="middle">load ?cid=…</text>
      <rect x="1300" y="830" width="160" height="22" rx="11" fill="#4a044e" stroke="#ec4899"/>
      <text x="1380" y="845" text-anchor="middle">1× realtime playback</text>
      <rect x="1470" y="830" width="120" height="22" rx="11" fill="#4a044e" stroke="#ec4899"/>
      <text x="1530" y="845" text-anchor="middle">recorder.start</text>
      <rect x="1300" y="860" width="160" height="22" rx="11" fill="#4a044e" stroke="#ec4899"/>
      <text x="1380" y="875" text-anchor="middle">Auto-DJ engages</text>
      <rect x="1470" y="860" width="120" height="22" rx="11" fill="#4a044e" stroke="#ec4899"/>
      <text x="1530" y="875" text-anchor="middle">safe macros only</text>
      <rect x="1300" y="890" width="160" height="22" rx="11" fill="#4a044e" stroke="#ec4899"/>
      <text x="1380" y="905" text-anchor="middle">poly cap = 256 / channel</text>
      <rect x="1470" y="890" width="120" height="22" rx="11" fill="#4a044e" stroke="#ec4899"/>
      <text x="1530" y="905" text-anchor="middle">audio-concurrent N</text>
    </g>
    <line x1="1270" y1="775" x2="1300" y2="845" class="spoke"/>
  </g>

  <!-- ======= E · LIFECYCLE (bottom) ======= -->
  <g>
    <rect x="885" y="853" width="190" height="54" rx="12" fill="#4c1d95" stroke="#a78bfa" stroke-width="2" filter="url(#shadow)"/>
    <text x="980" y="880" text-anchor="middle" class="branch">Lifecycle</text>
    <text x="980" y="896" text-anchor="middle" class="branchsub">first-write-wins · repair</text>

    <g font-size="11" fill="#ede9fe">
      <rect x="630"  y="950" width="160" height="22" rx="11" fill="#2e1065" stroke="#a78bfa"/>
      <text x="710"  y="965" text-anchor="middle">PUT /audio/{cid}.webm</text>
      <rect x="800"  y="950" width="160" height="22" rx="11" fill="#2e1065" stroke="#a78bfa"/>
      <text x="880"  y="965" text-anchor="middle">first-write-wins</text>
      <rect x="970"  y="950" width="120" height="22" rx="11" fill="#2e1065" stroke="#a78bfa"/>
      <text x="1030" y="965" text-anchor="middle">rate-limited</text>
      <rect x="1100" y="950" width="190" height="22" rx="11" fill="#2e1065" stroke="#a78bfa"/>
      <text x="1195" y="965" text-anchor="middle">X-Rebuild-Secret bypass</text>
      <rect x="630"  y="980" width="160" height="22" rx="11" fill="#2e1065" stroke="#a78bfa"/>
      <text x="710"  y="995" text-anchor="middle">⟳ rebuild-mark</text>
      <rect x="800"  y="980" width="160" height="22" rx="11" fill="#2e1065" stroke="#a78bfa"/>
      <text x="880"  y="995" text-anchor="middle">rebuild_queue (sqlite)</text>
      <rect x="970"  y="980" width="120" height="22" rx="11" fill="#2e1065" stroke="#a78bfa"/>
      <text x="1030" y="995" text-anchor="middle">worker re-render</text>
      <rect x="1100" y="980" width="190" height="22" rx="11" fill="#2e1065" stroke="#a78bfa"/>
      <text x="1195" y="995" text-anchor="middle">archive-delete (cascade)</text>
    </g>
    <line x1="980" y1="907" x2="980" y2="948" class="spoke"/>
  </g>

  <!-- ======= F · DISTRIBUTION (lower-left) ======= -->
  <g>
    <rect x="685" y="748" width="190" height="54" rx="12" fill="#334155" stroke="#94a3b8" stroke-width="2" filter="url(#shadow)"/>
    <text x="780" y="775" text-anchor="middle" class="branch">Distribution</text>
    <text x="780" y="791" text-anchor="middle" class="branchsub">routes · backups</text>

    <g font-size="11" fill="#e2e8f0">
      <rect x="380" y="800" width="180" height="22" rx="11" fill="#1e293b" stroke="#94a3b8"/>
      <text x="470" y="815" text-anchor="middle">GET /audio/{cid}.webm</text>
      <rect x="570" y="800" width="160" height="22" rx="11" fill="#1e293b" stroke="#94a3b8"/>
      <text x="650" y="815" text-anchor="middle">data/audio/YYYY/MM/</text>
      <rect x="380" y="830" width="180" height="22" rx="11" fill="#1e293b" stroke="#94a3b8"/>
      <text x="470" y="845" text-anchor="middle">/feed.rss enclosure</text>
      <rect x="570" y="830" width="160" height="22" rx="11" fill="#1e293b" stroke="#94a3b8"/>
      <text x="650" y="845" text-anchor="middle">feed card &lt;audio&gt;</text>
      <rect x="380" y="860" width="180" height="22" rx="11" fill="#1e293b" stroke="#94a3b8"/>
      <text x="470" y="875" text-anchor="middle">/api/snapshot?audio=1</text>
      <rect x="570" y="860" width="160" height="22" rx="11" fill="#1e293b" stroke="#94a3b8"/>
      <text x="650" y="875" text-anchor="middle">snapshots/*.tgz</text>
      <rect x="380" y="890" width="350" height="22" rx="11" fill="#1e293b" stroke="#94a3b8"/>
      <text x="555" y="905" text-anchor="middle">~2–3 MB / 3 min · immutable cache · long max-age</text>
    </g>
    <line x1="685" y1="775" x2="560" y2="815" class="spoke"/>
  </g>

  <!-- ======= REJOIN ARCS (cross-cuts that don't fit the pure six-spoke story) ======= -->

  <!-- macrosDisabled (lives in JSON envelope) → guards Capture -->
  <g fill="none" stroke="#ec4899" stroke-width="1.6" stroke-dasharray="6 4" opacity="0.85" marker-end="url(#arrowGuard)">
    <path d="M 250 187 C 220 460, 380 940, 1090 800"/>
    <text x="220" y="550" font-size="11" fill="#f9a8d4" font-weight="600">macrosDisabled · gate</text>
  </g>

  <!-- Lifecycle → Capture: rebuild worker bypasses FWW with the secret -->
  <g fill="none" stroke="#a78bfa" stroke-width="1.6" stroke-dasharray="6 4" opacity="0.85" marker-end="url(#arrowRebuild)">
    <path d="M 1195 950 C 1240 920, 1230 850, 1200 805"/>
    <text x="1230" y="900" font-size="10" fill="#c4b5fd">⟳ re-render bypass</text>
  </g>

  <!-- Source → Capture: bus is what MediaRecorder taps -->
  <g fill="none" stroke="#f59e0b" stroke-width="1.4" stroke-dasharray="5 5" opacity="0.7" marker-end="url(#arrow)">
    <path d="M 1245 627 C 1240 700, 1220 740, 1200 750"/>
    <text x="1245" y="710" font-size="10" fill="#fcd34d">tap → recorder</text>
  </g>

  <!-- Container → Codec: header declares the codec -->
  <g fill="none" stroke="#60a5fa" stroke-width="1.4" stroke-dasharray="5 5" opacity="0.7" marker-end="url(#arrow)">
    <path d="M 1080 320 C 1180 350, 1220 380, 1180 403"/>
  </g>

  <!-- Capture → Distribution: rendered file flows out to the routes -->
  <g fill="none" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="5 5" opacity="0.65" marker-end="url(#arrow)">
    <path d="M 1170 805 C 1100 850, 950 870, 875 793"/>
  </g>

  <!-- ======= LEGEND ======= -->
  <g transform="translate(40, 820)">
    <rect x="0" y="0" width="280" height="220" rx="10" fill="#0b1020" stroke="#334155" opacity="0.95"/>
    <text x="16" y="26" class="legendh">legend</text>

    <circle cx="26" cy="52" r="9" fill="#b45309" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="46" y="56" class="legend">audio dual (.webm)</text>

    <circle cx="26" cy="78" r="9" fill="#a16207" stroke="#fde68a" stroke-width="1.5"/>
    <text x="46" y="82" class="legend">JSON dual (envelope)</text>

    <line x1="14" y1="106" x2="42" y2="106" stroke="#67e8f9" stroke-width="3" stroke-dasharray="6 5"/>
    <text x="46" y="110" class="legend">CID twinship (same address)</text>

    <rect x="18" y="124" width="18" height="14" rx="4" fill="#1e3a8a" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="46" y="136" class="legend">decomposition (branch)</text>

    <line x1="18" y1="158" x2="40" y2="158" stroke="#475569" stroke-width="1.5"/>
    <text x="46" y="162" class="legend">deterministic morphism</text>

    <line x1="18" y1="180" x2="40" y2="180" stroke="#ec4899" stroke-width="1.5" stroke-dasharray="5 3"/>
    <text x="46" y="184" class="legend">quality guard (macrosDisabled)</text>

    <line x1="18" y1="202" x2="40" y2="202" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="5 3"/>
    <text x="46" y="206" class="legend">rebuild bypass (secret)</text>
  </g>

  <!-- footer -->
  <text x="1560" y="1080" text-anchor="end" class="sub">{cid}.webm · Opus 48 kHz · master bus capture · first-write-wins · paired with /o/{cid}</text>
</svg>
