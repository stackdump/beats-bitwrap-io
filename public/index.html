<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
    <meta name="theme-color" content="#16213e"/>
    <meta name="mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
    <meta name="apple-mobile-web-app-title" content="beats-btw"/>
    <title>beats-btw</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
    <link rel="apple-touch-icon" href="favicon.svg"/>
    <link rel="manifest" href="manifest.json"/>
    <link rel="stylesheet" href="petri-note.css"/>
    <!-- Tone.js for audio synthesis. Version pinned + SRI-hashed so a
         compromise of the unpkg CDN can't silently swap the bundle and
         turn this into a full XSS vector. Bump both fields together
         when upgrading. -->
    <script src="https://unpkg.com/tone@14.9.17/build/Tone.js"
            integrity="sha384-yRqCsPVM7qOD5eE8nkSeglBStE2HatcmQR23AtEma1Z5SoGJeSu1furZPm8YNTnv"
            crossorigin="anonymous"></script>
    <!-- QR code renderer — davidshimjs/qrcodejs, MIT; see vendor/NOTICE.md -->
    <script src="/vendor/qrcode.js"></script>
</head>
<body>
    <script type="module" src="petri-note.js"></script>
    <script>
      // Skip the service worker in dev — it caches ES modules so editing
      // source files mid-session leaves the page running old module
      // graphs even after reload. Production (beats.bitwrap.io) still
      // gets offline-capable SW-backed behavior.
      if ('serviceWorker' in navigator) {
        const host = location.hostname;
        const isDev = host === 'localhost' || host === '127.0.0.1' || host === '0.0.0.0';
        if (isDev) {
          navigator.serviceWorker.getRegistrations().then(regs => {
            for (const r of regs) r.unregister();
          });
        } else {
          navigator.serviceWorker.register('/sw.js');
        }
      }
    </script>

    <petri-note id="app">
    </petri-note>

    <!-- Phone-only floating mini-player. Mirrors the /feed FAB so the
         "go to the player" path is the same affordance on both pages.
         Click forwards to the canonical .pn-player-link inside the
         petri-note header, which handles current-cid + playlist append
         + navigation in one place. -->
    <button class="pn-fab" id="pn-fab" type="button" aria-label="Open player">
      <span class="pn-fab-icon" aria-hidden="true">
        <svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor"><polygon points="3,2 14,8 3,14"/></svg>
      </span>
      <span class="pn-fab-text">
        <span class="pn-fab-title">Player</span>
        <span class="pn-fab-meta">Tap to open feed</span>
      </span>
    </button>
    <script>
      (function () {
        const fab = document.getElementById('pn-fab');
        if (!fab) return;
        fab.addEventListener('click', () => {
          const link = document.querySelector('.pn-player-link');
          if (link) link.click();
          else location.href = '/feed';
        });
      })();
    </script>
</body>
</html>
