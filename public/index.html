<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
    <meta name="theme-color" content="#16213e"/>
    <meta name="mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
    <meta name="apple-mobile-web-app-title" content="beats-btw"/>
    <title>beats-btw</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
    <link rel="apple-touch-icon" href="favicon.svg"/>
    <link rel="manifest" href="manifest.json"/>
    <link rel="stylesheet" href="petri-note.css"/>
    <!-- Tone.js for audio synthesis -->
    <script src="https://unpkg.com/tone@14"></script>
    <!-- QR code renderer — davidshimjs/qrcodejs, MIT; see vendor/NOTICE.md -->
    <script src="/vendor/qrcode.js"></script>
</head>
<body>
    <script type="module" src="petri-note.js"></script>
    <script>
      // Skip the service worker in dev — it caches ES modules so editing
      // source files mid-session leaves the page running old module
      // graphs even after reload. Production (beats.bitwrap.io) still
      // gets offline-capable SW-backed behavior.
      if ('serviceWorker' in navigator) {
        const host = location.hostname;
        const isDev = host === 'localhost' || host === '127.0.0.1' || host === '0.0.0.0';
        if (isDev) {
          navigator.serviceWorker.getRegistrations().then(regs => {
            for (const r of regs) r.unregister();
          });
        } else {
          navigator.serviceWorker.register('/sw.js');
        }
      }
    </script>

    <petri-note id="app">
    </petri-note>
</body>
</html>
