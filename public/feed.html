<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>feed · beats.bitwrap.io</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="license" href="https://creativecommons.org/licenses/by/4.0/">
<link rel="alternate" type="application/rss+xml" title="beats.bitwrap.io recent renders" href="/feed.rss">
<style>
  body {
    background: #0a0a0a;
    color: #ddd;
    font-family: system-ui, sans-serif;
    margin: 0;
    padding: 0;
  }
  header {
    padding: 16px 24px;
    border-bottom: 1px solid #1a1a1a;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  header h1 {
    margin: 0;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  header h1 a { color: inherit; text-decoration: none; }
  .filters {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-left: auto;
    font-size: 13px;
    color: #888;
    flex-wrap: wrap;
  }
  .filters select, .filters input[type="search"] {
    background: #111;
    color: #ddd;
    border: 1px solid #2a2a2a;
    border-radius: 4px;
    padding: 5px 9px;
    font-size: 13px;
    font-family: inherit;
  }
  .filters input[type="search"] {
    min-width: 180px;
  }
  .filters .rss, .filters .pn-toggle-pl {
    color: #9ad;
    text-decoration: none;
    font-size: 12px;
    background: transparent;
    border: 1px solid #2a3a4a;
    padding: 5px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
  }
  .filters .rss:hover, .filters .pn-toggle-pl:hover { border-color: #4a5a7a; }
  .pn-toggle-pl[data-active="true"] {
    background: #1a2a3a;
    color: #fff;
  }
  .layout {
    display: grid;
    grid-template-columns: 1fr;
    gap: 0;
  }
  .layout[data-pl="open"] {
    grid-template-columns: 360px 1fr;
  }
  /* When Webamp owns playback, the sidebar's transport + queue
     would just compete with it (and double up as a second visible
     player). Collapse the sidebar back to one column for the
     duration of the Webamp session. */
  .layout[data-webamp="open"] {
    grid-template-columns: 1fr;
  }
  .layout[data-webamp="open"] aside.playlist { display: none; }
  main {
    padding: 20px 24px;
    min-width: 0;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }
  .card {
    background: #0d0d0d;
    border: 1px solid #1a1a1a;
    border-radius: 8px;
    overflow: hidden;
    color: inherit;
    display: flex;
    flex-direction: column;
    position: relative;
    transition: border-color 0.15s, transform 0.15s;
  }
  .card:hover {
    border-color: #3a3a4a;
    transform: translateY(-2px);
  }
  .card-link { color: inherit; text-decoration: none; display: block; }
  .card-art {
    aspect-ratio: 1200 / 630;
    background: #000;
    display: block;
    width: 100%;
  }
  .card-meta { padding: 12px 14px 14px; font-size: 13px; line-height: 1.4; }
  .card-title {
    font-weight: 600;
    color: #eee;
    margin-bottom: 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .card-sub { color: #888; font-size: 12px; font-variant-numeric: tabular-nums; }
  .card-actions {
    position: absolute;
    top: 8px; right: 8px;
    display: flex;
    gap: 4px;
  }
  .card-actions button {
    background: rgba(0,0,0,0.7);
    color: #9ad;
    border: 1px solid #2a3a4a;
    border-radius: 4px;
    width: 36px; height: 36px;
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    backdrop-filter: blur(2px);
    padding: 0;
  }
  .card-actions button:hover { background: #1a2a3a; color: #fff; border-color: #4a5a7a; }
  .card-add[data-added="true"] { background: #1a3a2a; border-color: #2a5a3a; color: #aea; }
  .card-bm[data-bm="true"] { background: #3a2a08; border-color: #6a4a18; color: #fc6; }
  .card-play[data-state="playing"] { background: #1a2a3a; color: #67e8f9; border-color: #2a4a6a; }
  .empty, .loading, .end {
    padding: 48px 0;
    text-align: center;
    color: #666;
    font-size: 14px;
  }
  .more-btn {
    display: block;
    margin: 32px auto 16px;
    padding: 9px 22px;
    background: #1a1a2e;
    color: #ddd;
    border: 1px solid #2a2a3a;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
  }
  .more-btn:hover { border-color: #3a3a5a; }
  /* Playlist sidebar — draws on the right edge of the layout. Sticky
     so the audio + transport stay in view while scrolling the grid. */
  aside.playlist {
    border-right: 1px solid #1a1a1a;
    background: #08080a;
    padding: 16px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    display: none;
    flex-direction: column;
    gap: 12px;
  }
  .layout[data-pl="open"] aside.playlist { display: flex; }
  .pl-now {
    border: 1px solid #1a1a1a;
    border-radius: 6px;
    padding: 10px 12px;
    background: #050505;
  }
  .pl-now-title {
    font-size: 13px;
    font-weight: 600;
    color: #eee;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .pl-now-sub { font-size: 11px; color: #777; margin-top: 2px; }
  .pl-now audio { width: 100%; height: 32px; margin-top: 8px; }
  .pl-controls {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    font-size: 11px;
  }
  .pl-controls button {
    flex: 1;
    background: #1a1a2e;
    color: #ddd;
    border: 1px solid #2a2a3a;
    border-radius: 4px;
    padding: 5px 0;
    cursor: pointer;
    font-family: inherit;
  }
  .pl-controls button:hover { border-color: #3a3a5a; }
  .pl-controls button:disabled { opacity: 0.4; cursor: default; }
  /* Shuffle / repeat modes glow when active. Repeat-one carries
     a tiny "1" superscript so the user can tell it from "all". */
  .pl-controls button[data-on="true"] {
    background: #1a2a3a;
    color: #67e8f9;
    border-color: #2a4a6a;
  }
  #pl-repeat[data-mode="one"]::after {
    content: '1';
    font-size: 8px;
    vertical-align: super;
    margin-left: 1px;
  }
  .pl-list {
    flex: 1;
    overflow-y: auto;
    border: 1px solid #1a1a1a;
    border-radius: 6px;
    background: #050505;
    padding: 6px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .pl-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    line-height: 1.3;
  }
  .pl-item:hover { background: #111; }
  .pl-item[data-current="true"] {
    background: #142028;
    border-left: 2px solid #67e8f9;
  }
  .pl-item-num {
    width: 22px;
    color: #555;
    font-variant-numeric: tabular-nums;
    text-align: right;
    flex-shrink: 0;
  }
  .pl-item[data-current="true"] .pl-item-num { color: #67e8f9; }
  .pl-item-meta { flex: 1; min-width: 0; overflow: hidden; }
  .pl-item-title {
    color: #ddd;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .pl-item-sub {
    color: #666;
    font-size: 10px;
    font-variant-numeric: tabular-nums;
  }
  .pl-item-remove {
    background: transparent;
    border: none;
    color: #555;
    cursor: pointer;
    font-size: 14px;
    padding: 0 4px;
    flex-shrink: 0;
  }
  .pl-item-remove:hover { color: #c66; }
  .pl-meta {
    font-size: 11px;
    color: #555;
    display: flex;
    justify-content: space-between;
    margin-top: 2px;
  }
  .pl-clear, .pl-export {
    background: transparent;
    border: none;
    cursor: pointer;
    font-size: 11px;
    padding: 0;
    text-decoration: underline;
  }
  .pl-clear { color: #a55; }
  .pl-export { color: #9ad; }
  .pl-export:disabled { opacity: 0.4; cursor: default; text-decoration: none; }
  .pl-empty {
    text-align: center;
    color: #555;
    font-size: 12px;
    padding: 32px 8px;
  }
  /* Narrow viewports: phone-class. The 360px sidebar column would
     leave ~15px for the grid, so flip it into a full-screen overlay
     when toggled open. The grid always has the full width; the
     sidebar slides in on top of it like a drawer. Tapping the
     dimmed backdrop closes it. */
  @media (max-width: 720px) {
    .layout, .layout[data-pl="open"] { grid-template-columns: 1fr; }
    aside.playlist {
      position: fixed;
      inset: 0;
      width: 100%;
      max-width: 100%;
      height: 100vh;
      z-index: 50;
      box-shadow: 0 0 40px rgba(0,0,0,0.6);
      border-right: none;
    }
    .layout[data-pl="open"]::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 49;
    }
  }

  /* Confirmation modal — fires on arrival when /feed?cid=… points
     at a specific track, so the user gets visual continuity from
     the synth view's welcome card to the player's grid. */
  .card-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card-modal[hidden] { display: none; }
  .card-modal-inner {
    background: #0d0d0d;
    border: 1px solid #222;
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    max-width: 720px;
    width: 100%;
    overflow: hidden;
    position: relative;
    color: #ddd;
    font-family: system-ui, sans-serif;
  }
  .card-modal-art {
    width: 100%;
    aspect-ratio: 1200 / 630;
    background: #000;
    display: block;
  }
  .card-modal-title {
    padding: 16px 20px 4px;
    font-size: 18px;
    font-weight: 600;
    color: #eee;
  }
  .card-modal-sub {
    padding: 0 20px 12px;
    font-size: 13px;
    color: #888;
  }
  .card-modal-actions {
    padding: 0 20px 20px;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .card-modal-play {
    flex: 1;
    padding: 12px;
    background: #e94560;
    border: none;
    color: #fff;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
  }
  .card-modal-open {
    color: #9ad;
    text-decoration: none;
    font-size: 13px;
  }
  .card-modal-open:hover { text-decoration: underline; }
  .card-modal-close {
    position: absolute;
    top: 8px; right: 8px;
    background: rgba(0,0,0,0.6);
    border: 1px solid #333;
    color: #ddd;
    border-radius: 4px;
    width: 32px; height: 32px;
    cursor: pointer;
    font-size: 18px;
    z-index: 1;
  }

  footer {
    padding: 14px 24px 22px;
    border-top: 1px solid #1a1a1a;
    color: #666;
    font-size: 11px;
    letter-spacing: 0.04em;
    margin-top: 24px;
  }
  footer a { color: #9ad; text-decoration: none; }
  footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<header>
  <h1><a href="/">beats.bitwrap.io</a> · feed</h1>
  <div class="filters">
    <input type="search" id="search" placeholder="search by name or seed…" autocomplete="off">
    <label>genre
      <select id="genre">
        <option value="">all</option>
      </select>
    </label>
    <button class="pn-toggle-pl" id="toggle-pl" title="Toggle playlist sidebar">playlist</button>
    <button class="pn-toggle-pl" id="toggle-wa" title="Open in Winamp-style player">webamp</button>
    <a href="/feed.rss" class="rss" title="RSS / podcast feed">RSS</a>
  </div>
</header>
<div class="layout" id="layout">
  <aside class="playlist">
    <div class="pl-now" id="pl-now">
      <div class="pl-now-title" id="pl-now-title">No track loaded</div>
      <div class="pl-now-sub" id="pl-now-sub">Add tracks from the grid →</div>
      <audio id="pl-audio" controls preload="none"></audio>
      <div class="pl-controls">
        <button id="pl-shuffle" title="Shuffle off">🔀</button>
        <button id="pl-prev" title="Previous">◀◀</button>
        <button id="pl-play" title="Play / pause">▶</button>
        <button id="pl-next" title="Next">▶▶</button>
        <button id="pl-repeat" title="Repeat off">↻</button>
      </div>
    </div>
    <div class="pl-meta">
      <span id="pl-count">0 tracks</span>
      <span style="display:flex;gap:10px">
        <button class="pl-export" id="pl-import" title="Load a JSON-LD MusicPlaylist file">import</button>
        <button class="pl-export" id="pl-export" title="Download as JSON-LD MusicPlaylist">export</button>
        <button class="pl-clear" id="pl-clear">clear</button>
      </span>
      <input type="file" id="pl-import-file" accept=".jsonld,application/ld+json,application/json" hidden>
    </div>
    <div class="pl-list" id="pl-list"></div>
  </aside>
  <main>
    <div id="grid" class="grid"></div>
    <div id="state" class="loading">Loading…</div>
    <button id="more" class="more-btn" hidden>Load more</button>
  </main>
</div>
<div id="webamp-mount"></div>
<div id="card-modal" class="card-modal" hidden>
  <div class="card-modal-inner">
    <button class="card-modal-close" title="Close (Esc)">&times;</button>
    <img class="card-modal-art" alt="Track card">
    <div class="card-modal-title"></div>
    <div class="card-modal-sub"></div>
    <div class="card-modal-actions">
      <button class="card-modal-play">▶ Play</button>
      <a class="card-modal-open" href="#">Open in editor</a>
    </div>
  </div>
</div>
<footer>
  Tracks
  <a href="https://creativecommons.org/licenses/by/4.0/">CC BY 4.0</a>
  — reuse with attribution to beats.bitwrap.io
</footer>
<script type="module">
import { recordBookmarked, unrecordBookmarked, isBookmarked }
  from '/lib/share/history.js';

const GENRES = [
  'ambient','blues','bossa','country','dnb','dubstep','edm','funk','garage',
  'house','jazz','lofi','metal','reggae','speedcore','synthwave','techno','trance','trap',
];
const PL_KEY = 'pn-playlist';
const PL_OPEN_KEY = 'pn-playlist-open';
const PL_STATE_KEY = 'pn-playlist-state'; // { idx, position, savedAt }

const grid = document.getElementById('grid');
const stateEl = document.getElementById('state');
const more = document.getElementById('more');
const genreSel = document.getElementById('genre');
const search = document.getElementById('search');
const toggleBtn = document.getElementById('toggle-pl');
const layout = document.getElementById('layout');
const audioEl = document.getElementById('pl-audio');
const playBtn = document.getElementById('pl-play');
const prevBtn = document.getElementById('pl-prev');
const nextBtn = document.getElementById('pl-next');
const shuffleBtn = document.getElementById('pl-shuffle');
const repeatBtn  = document.getElementById('pl-repeat');
const nowTitle = document.getElementById('pl-now-title');
const nowSub = document.getElementById('pl-now-sub');
const plList = document.getElementById('pl-list');
const plCount = document.getElementById('pl-count');
const plClear = document.getElementById('pl-clear');
const plExport = document.getElementById('pl-export');

for (const g of GENRES) {
  const o = document.createElement('option');
  o.value = g; o.textContent = g;
  genreSel.appendChild(o);
}

const url = new URL(location.href);
genreSel.value = url.searchParams.get('genre') || '';
search.value = url.searchParams.get('q') || '';

// ----- Playlist state -----
let playlist = [];
let current = -1;
try { playlist = JSON.parse(localStorage.getItem(PL_KEY) || '[]'); } catch {}
if (!Array.isArray(playlist)) playlist = [];

const savePlaylist = () => {
  try { localStorage.setItem(PL_KEY, JSON.stringify(playlist)); } catch {}
};

// Persist current track + position so a reload picks up where the
// listener left off. Throttled by callers to avoid hammering
// localStorage on every timeupdate (~ 4 Hz).
const savePlaybackState = () => {
  if (current < 0) {
    try { localStorage.removeItem(PL_STATE_KEY); } catch {}
    return;
  }
  try {
    localStorage.setItem(PL_STATE_KEY, JSON.stringify({
      idx: current,
      position: Number.isFinite(audioEl.currentTime) ? audioEl.currentTime : 0,
      savedAt: Date.now(),
    }));
  } catch {}
};

const setPaneOpen = (open) => {
  layout.dataset.pl = open ? 'open' : 'closed';
  toggleBtn.dataset.active = open ? 'true' : 'false';
  try { localStorage.setItem(PL_OPEN_KEY, open ? '1' : '0'); } catch {}
};
setPaneOpen(localStorage.getItem(PL_OPEN_KEY) === '1' || playlist.length > 0);
toggleBtn.addEventListener('click', () => {
  setPaneOpen(layout.dataset.pl !== 'open');
});

const fmtTime = (ms) => {
  const diff = Date.now() - ms;
  if (diff < 60_000) return 'just now';
  if (diff < 3_600_000) return Math.round(diff / 60_000) + 'm ago';
  if (diff < 86_400_000) return Math.round(diff / 3_600_000) + 'h ago';
  if (diff < 7 * 86_400_000) return Math.round(diff / 86_400_000) + 'd ago';
  return new Date(ms).toLocaleDateString();
};

const isInPlaylist = (cid) => playlist.some(p => p.cid === cid);

const addToPlaylist = (track) => {
  if (isInPlaylist(track.cid)) return;
  playlist.push({
    cid: track.cid,
    name: track.name || '',
    genre: track.genre || '',
    tempo: track.tempo || 0,
    seed: track.seed || 0,
  });
  savePlaylist();
  setPaneOpen(true);
  renderPlaylist();
  syncCardAddButtons();
};

const removeFromPlaylist = (cid) => {
  const i = playlist.findIndex(p => p.cid === cid);
  if (i < 0) return;
  playlist.splice(i, 1);
  if (current === i) {
    // Currently-playing track removed: stop and re-pin to whatever
    // landed at this index (or back off if we trimmed the tail).
    audioEl.pause();
    audioEl.removeAttribute('src');
    current = Math.min(current, playlist.length - 1);
    if (current >= 0) loadCurrent(false);
    else clearNow();
  } else if (current > i) {
    current--; // index shifted left
  }
  savePlaylist();
  renderPlaylist();
  syncCardAddButtons();
};

const clearPlaylist = () => {
  if (!playlist.length) return;
  if (!confirm('Clear the playlist?')) return;
  playlist = [];
  current = -1;
  audioEl.pause();
  audioEl.removeAttribute('src');
  clearNow();
  savePlaylist();
  renderPlaylist();
  syncCardAddButtons();
};
plClear.addEventListener('click', clearPlaylist);

// Export the current playlist as a schema.org MusicPlaylist JSON-LD
// document. Each track is a MusicRecording keyed by CID; the URL
// roundtrips back to the player. The downloaded file is a clean
// interchange format for sharing playlists between tools.
const exportPlaylistJsonld = () => {
  if (!playlist.length) return;
  const origin = location.origin;
  const tracks = playlist.map((t, i) => ({
    '@type': 'MusicRecording',
    'identifier': t.cid,
    'name': trackTitle(t),
    'genre': t.genre || undefined,
    'url': `${origin}/?cid=${encodeURIComponent(t.cid)}`,
    'audio': `${origin}/audio/${encodeURIComponent(t.cid)}.webm`,
    'position': i + 1,
  }));
  const doc = {
    '@context': 'https://schema.org',
    '@type': 'MusicPlaylist',
    'name': `beats.bitwrap.io playlist (${playlist.length})`,
    'numTracks': playlist.length,
    'license': 'https://creativecommons.org/licenses/by/4.0/',
    'copyrightNotice': 'CC BY 4.0 — beats.bitwrap.io',
    'dateCreated': new Date().toISOString(),
    'track': tracks,
  };
  const blob = new Blob([JSON.stringify(doc, null, 2)],
                       { type: 'application/ld+json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const stamp = new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-');
  a.download = `beats-playlist-${stamp}.jsonld`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
};
plExport.addEventListener('click', exportPlaylistJsonld);

// Import a JSON-LD MusicPlaylist. Accepts drop or file-picker.
// Permissive parser: each track's CID can come from `identifier`,
// from a URL with `?cid=…`, or from the `/audio/{cid}.webm` audio
// URL — whichever is present. Tracks already in the playlist are
// skipped (CID dedup).
const CID_RE = /^z[1-9A-HJ-NP-Za-km-z]{20,}$/;
const cidFromTrack = (t) => {
  if (typeof t.identifier === 'string' && CID_RE.test(t.identifier)) return t.identifier;
  for (const field of ['url', 'audio', '@id']) {
    const v = t[field];
    if (typeof v !== 'string') continue;
    const m = v.match(/cid=([a-zA-Z0-9]+)/) || v.match(/\/audio\/([a-zA-Z0-9]+)\.webm/);
    if (m && CID_RE.test(m[1])) return m[1];
  }
  return null;
};
const importPlaylistJsonld = async (file) => {
  let doc;
  try {
    doc = JSON.parse(await file.text());
  } catch (err) {
    alert(`Couldn't parse that file as JSON: ${err.message}`);
    return;
  }
  if (doc?.['@type'] !== 'MusicPlaylist' || !Array.isArray(doc.track)) {
    alert('Not a MusicPlaylist — expected @type "MusicPlaylist" with a track[] array.');
    return;
  }
  let added = 0, skipped = 0, invalid = 0;
  for (const t of doc.track) {
    const cid = cidFromTrack(t);
    if (!cid) { invalid++; continue; }
    if (isInPlaylist(cid)) { skipped++; continue; }
    addToPlaylist({
      cid,
      name:  typeof t.name === 'string' ? t.name : '',
      genre: typeof t.genre === 'string' ? t.genre : '',
      tempo: 0,
      seed:  0,
    });
    added++;
  }
  const msg = [`${added} added`,
               skipped ? `${skipped} skipped (already in playlist)` : '',
               invalid ? `${invalid} invalid` : ''].filter(Boolean).join(' · ');
  // Soft notice in the export-status area; render after batch so
  // we don't fight the per-add reflows.
  plCount.textContent = msg;
  setTimeout(() => renderPlaylist(), 800);  // restore the count after a moment
};
const importInput = document.getElementById('pl-import-file');
document.getElementById('pl-import').addEventListener('click', () => importInput.click());
importInput.addEventListener('change', () => {
  if (importInput.files && importInput.files[0]) {
    importPlaylistJsonld(importInput.files[0]);
    importInput.value = '';  // reset so the same file can be re-imported
  }
});

// Drop a .jsonld onto the playlist sidebar to import. dragover must
// be cancelled or the drop event won't fire.
const playlistAside = document.querySelector('aside.playlist');
['dragenter', 'dragover'].forEach(ev => {
  playlistAside.addEventListener(ev, (e) => {
    if (e.dataTransfer?.types?.includes('Files')) {
      e.preventDefault();
      playlistAside.style.outline = '2px dashed #4a5a7a';
    }
  });
});
['dragleave', 'drop'].forEach(ev => {
  playlistAside.addEventListener(ev, () => { playlistAside.style.outline = ''; });
});
playlistAside.addEventListener('drop', (e) => {
  if (!e.dataTransfer?.files?.length) return;
  e.preventDefault();
  importPlaylistJsonld(e.dataTransfer.files[0]);
});

const trackTitle = (t) => t.name || `${t.genre || 'track'} · ${t.seed}`;

const clearNow = () => {
  nowTitle.textContent = playlist.length ? 'No track selected' : 'No track loaded';
  nowSub.textContent = playlist.length ? 'Click a row to play' : 'Add tracks from the grid →';
  playBtn.textContent = '▶';
};

// Pre-load the next track via <link rel=preload> so the
// crossover from `ended` → `play` on the next CID is closer to
// gapless. Browsers will warm their HTTP cache + audio decoder.
let preloadLink = null;
const preloadNext = () => {
  if (preloadLink) { preloadLink.remove(); preloadLink = null; }
  if (current + 1 >= playlist.length) return;
  const next = playlist[current + 1];
  preloadLink = document.createElement('link');
  preloadLink.rel = 'preload';
  preloadLink.as = 'audio';
  preloadLink.href = `/audio/${encodeURIComponent(next.cid)}.webm`;
  document.head.appendChild(preloadLink);
};

const loadCurrent = (autoplay = true) => {
  if (current < 0 || current >= playlist.length) { clearNow(); return; }
  const t = playlist[current];
  audioEl.src = `/audio/${encodeURIComponent(t.cid)}.webm`;
  nowTitle.textContent = trackTitle(t);
  nowSub.textContent = [t.genre, t.tempo ? `${t.tempo} BPM` : ''].filter(Boolean).join(' · ');
  preloadNext();
  // MediaSession metadata + artwork so lock-screen / now-playing
  // widgets (Mac Touch Bar, iOS lock screen, Android notification,
  // Chrome's media hub) get the right title and the share-card SVG
  // as cover art. The action handlers below let hardware media
  // keys (▶ / ⏸ / ⏭ / ⏮) drive the playlist.
  if ('mediaSession' in navigator) {
    const cardURL = `${location.origin}/share-card/${encodeURIComponent(t.cid)}.png`;
    navigator.mediaSession.metadata = new MediaMetadata({
      title: trackTitle(t),
      artist: 'beats.bitwrap.io',
      album: t.genre || 'beats.bitwrap.io',
      artwork: [
        { src: cardURL, sizes: '1200x630', type: 'image/png' },
      ],
    });
  }
  if (autoplay) {
    audioEl.play().catch(() => {});
  }
  renderPlaylist();
  syncCardPlayButtons();
};

// Wire MediaSession action handlers once. The audio element handles
// play/pause natively, but explicit handlers tell the browser the
// site is media-aware so the system surfaces the controls properly.
if ('mediaSession' in navigator) {
  navigator.mediaSession.setActionHandler('play',  () => audioEl.play().catch(() => {}));
  navigator.mediaSession.setActionHandler('pause', () => audioEl.pause());
  navigator.mediaSession.setActionHandler('previoustrack', () => prevBtn.click());
  navigator.mediaSession.setActionHandler('nexttrack',     () => nextBtn.click());
}

const playIndex = (i) => {
  if (i < 0 || i >= playlist.length) return;
  current = i;
  loadCurrent(true);
};

playBtn.addEventListener('click', () => {
  if (current < 0 && playlist.length) {
    playIndex(0);
    return;
  }
  if (audioEl.paused) audioEl.play().catch(() => {});
  else audioEl.pause();
});
prevBtn.addEventListener('click', () => {
  if (playlist.length === 0) return;
  if (shuffleOn && playlist.length > 1) {
    let pick;
    do { pick = Math.floor(Math.random() * playlist.length); } while (pick === current);
    playIndex(pick);
    return;
  }
  if (current > 0) playIndex(current - 1);
  else if (repeatMode === 'all') playIndex(playlist.length - 1);
});
nextBtn.addEventListener('click', () => {
  // Manual next mirrors auto-advance, except repeat=one becomes
  // sequential (otherwise the button would feel broken).
  if (playlist.length === 0) return;
  if (shuffleOn && playlist.length > 1) {
    let pick;
    do { pick = Math.floor(Math.random() * playlist.length); } while (pick === current);
    playIndex(pick);
    return;
  }
  if (current < playlist.length - 1) playIndex(current + 1);
  else if (repeatMode === 'all') playIndex(0);
});
audioEl.addEventListener('play',  () => { playBtn.textContent = '⏸'; requestWake(); syncCardPlayButtons(); });
audioEl.addEventListener('pause', () => { playBtn.textContent = '▶'; releaseWake(); savePlaybackState(); syncCardPlayButtons(); });

// ----- Shuffle / repeat modes -----
const SHUFFLE_KEY = 'pn-playlist-shuffle';
const REPEAT_KEY  = 'pn-playlist-repeat';   // 'off' | 'all' | 'one'
let shuffleOn = (() => { try { return localStorage.getItem(SHUFFLE_KEY) === '1'; } catch { return false; } })();
let repeatMode = (() => {
  try {
    const v = localStorage.getItem(REPEAT_KEY);
    return v === 'all' || v === 'one' ? v : 'off';
  } catch { return 'off'; }
})();
const REPEAT_LABEL = { off: 'Repeat off', all: 'Repeat all', one: 'Repeat one' };

const renderModeButtons = () => {
  shuffleBtn.dataset.on = shuffleOn ? 'true' : 'false';
  shuffleBtn.title = shuffleOn ? 'Shuffle on' : 'Shuffle off';
  repeatBtn.dataset.mode = repeatMode;
  repeatBtn.dataset.on = repeatMode !== 'off' ? 'true' : 'false';
  repeatBtn.title = REPEAT_LABEL[repeatMode];
};

shuffleBtn.addEventListener('click', () => {
  shuffleOn = !shuffleOn;
  try { localStorage.setItem(SHUFFLE_KEY, shuffleOn ? '1' : '0'); } catch {}
  renderModeButtons();
});
repeatBtn.addEventListener('click', () => {
  repeatMode = repeatMode === 'off' ? 'all'
             : repeatMode === 'all' ? 'one'
             : 'off';
  try { localStorage.setItem(REPEAT_KEY, repeatMode); } catch {}
  renderModeButtons();
});

// Pick the next index given current modes. Returns -1 if playback
// should stop (end of queue with repeat=off). Shuffle picks a random
// index that isn't `current`; if the queue has 1 entry it re-plays.
const nextIndex = () => {
  if (playlist.length === 0) return -1;
  if (repeatMode === 'one') return current;
  if (shuffleOn) {
    if (playlist.length === 1) {
      return repeatMode === 'all' ? current : -1;
    }
    let pick;
    do { pick = Math.floor(Math.random() * playlist.length); } while (pick === current);
    return pick;
  }
  if (current < playlist.length - 1) return current + 1;
  return repeatMode === 'all' ? 0 : -1;
};

audioEl.addEventListener('ended', () => {
  const nxt = nextIndex();
  if (nxt < 0) { playBtn.textContent = '▶'; releaseWake(); return; }
  // repeat=one against the same index: rewind + play instead of
  // re-loading the src (no decoder churn).
  if (nxt === current) {
    audioEl.currentTime = 0;
    audioEl.play().catch(() => {});
    return;
  }
  playIndex(nxt);
});

renderModeButtons();

// Throttled position save while playing — every 3s of timeupdate
// firings is enough for "pick up where I left off" without
// hammering localStorage.
let saveTimer = null;
audioEl.addEventListener('timeupdate', () => {
  if (saveTimer) return;
  saveTimer = setTimeout(() => { saveTimer = null; savePlaybackState(); }, 3000);
});

// Screen wake lock — keeps the device awake while audio plays so
// the lock screen doesn't dim and the OS doesn't pause us. Released
// on pause/end. Re-acquired on visibility return because the OS
// drops the lock when the tab goes hidden.
let wakeLock = null;
const requestWake = async () => {
  if (!('wakeLock' in navigator)) return;
  if (wakeLock) return;
  try { wakeLock = await navigator.wakeLock.request('screen'); } catch {}
};
const releaseWake = async () => {
  if (!wakeLock) return;
  try { await wakeLock.release(); } catch {}
  wakeLock = null;
};
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && !audioEl.paused) requestWake();
});

const renderPlaylist = () => {
  plCount.textContent = `${playlist.length} track${playlist.length === 1 ? '' : 's'}`;
  plExport.disabled = playlist.length === 0;
  if (playlist.length === 0) {
    plList.innerHTML = `<div class="pl-empty">Add tracks from the grid with the <b>+</b> button.</div>`;
    return;
  }
  plList.innerHTML = '';
  playlist.forEach((t, i) => {
    const row = document.createElement('div');
    row.className = 'pl-item';
    if (i === current) row.dataset.current = 'true';
    const sub = [t.genre, t.tempo ? `${t.tempo} BPM` : ''].filter(Boolean).join(' · ');
    row.innerHTML = `
      <span class="pl-item-num">${i + 1}.</span>
      <div class="pl-item-meta">
        <div class="pl-item-title"></div>
        <div class="pl-item-sub"></div>
      </div>
      <button class="pl-item-remove" title="Remove">×</button>
    `;
    row.querySelector('.pl-item-title').textContent = trackTitle(t);
    row.querySelector('.pl-item-sub').textContent = sub;
    row.addEventListener('click', (e) => {
      if (e.target.closest('.pl-item-remove')) return;
      playIndex(i);
    });
    row.querySelector('.pl-item-remove').addEventListener('click', (e) => {
      e.stopPropagation();
      removeFromPlaylist(t.cid);
    });
    plList.appendChild(row);
  });
};

const syncCardAddButtons = () => {
  for (const btn of grid.querySelectorAll('.card-add')) {
    btn.dataset.added = isInPlaylist(btn.dataset.cid) ? 'true' : 'false';
    btn.textContent = btn.dataset.added === 'true' ? '✓' : '+';
    btn.title = btn.dataset.added === 'true' ? 'Already in playlist' : 'Add to playlist';
  }
};

const syncCardBookmarkButtons = () => {
  for (const btn of grid.querySelectorAll('.card-bm')) {
    const on = isBookmarked(btn.dataset.cid);
    btn.dataset.bm = on ? 'true' : 'false';
    btn.title = on
      ? 'Bookmarked — click to remove'
      : 'Bookmark — saves to your local history with the bookmarked tag';
  }
};

const syncCardPlayButtons = () => {
  const playingCid = (current >= 0 && !audioEl.paused) ? playlist[current]?.cid : null;
  for (const btn of grid.querySelectorAll('.card-play')) {
    const isThis = playingCid && playingCid === btn.dataset.cid;
    btn.dataset.state = isThis ? 'playing' : 'idle';
    btn.textContent = isThis ? '⏸' : '▶';
    btn.title = isThis ? 'Pause' : 'Play / pause this track';
  }
};

// ----- Grid rendering -----
let cursor = 0;
let loading = false;
let exhausted = false;

const matchesSearch = (t, q) => {
  if (!q) return true;
  const hay = `${t.name || ''} ${t.genre || ''} ${t.seed || ''} ${t.cid || ''}`.toLowerCase();
  return hay.includes(q);
};

const renderCard = (t) => {
  const card = document.createElement('div');
  card.className = 'card';
  const title = trackTitle(t);
  const sub = [t.genre, t.tempo ? `${t.tempo} BPM` : '', fmtTime(t.renderedAt)]
    .filter(Boolean).join(' · ');
  card.innerHTML = `
    <a class="card-link" href="/?cid=${encodeURIComponent(t.cid)}">
      <img class="card-art" src="/share-card/${encodeURIComponent(t.cid)}.svg" alt="" loading="lazy">
      <div class="card-meta">
        <div class="card-title"></div>
        <div class="card-sub"></div>
      </div>
    </a>
    <div class="card-actions">
      <button class="card-play" data-cid="${t.cid}" title="Play / pause this track">▶</button>
      <button class="card-bm" data-cid="${t.cid}" title="Bookmark — saves to your local history with the bookmarked tag">★</button>
      <button class="card-add" data-cid="${t.cid}" title="Add to playlist">+</button>
    </div>
  `;
  card.querySelector('.card-title').textContent = title;
  card.querySelector('.card-sub').textContent = sub;
  const addBtn = card.querySelector('.card-add');
  addBtn.addEventListener('click', (e) => {
    e.preventDefault();
    e.stopPropagation();
    if (isInPlaylist(t.cid)) removeFromPlaylist(t.cid);
    else addToPlaylist(t);
  });
  const bmBtn = card.querySelector('.card-bm');
  bmBtn.addEventListener('click', (e) => {
    e.preventDefault();
    e.stopPropagation();
    if (isBookmarked(t.cid)) {
      unrecordBookmarked(t.cid);
    } else {
      // Pass the projected payload so the history modal can show
      // the right name / genre / tempo without another fetch.
      recordBookmarked(t.cid, {
        name: t.name, genre: t.genre, tempo: t.tempo, seed: t.seed,
      });
    }
    syncCardBookmarkButtons();
  });
  // Play button — tap-to-play without ceremony. If this track is
  // already current and audio is playing → pause. Otherwise jump
  // to it (adding to the playlist if not already there).
  const playButton = card.querySelector('.card-play');
  playButton.addEventListener('click', (e) => {
    e.preventDefault();
    e.stopPropagation();
    if (current >= 0 && playlist[current]?.cid === t.cid) {
      // Already on this track — toggle pause.
      if (audioEl.paused) audioEl.play().catch(() => {});
      else audioEl.pause();
      return;
    }
    let idx = playlist.findIndex(p => p.cid === t.cid);
    if (idx < 0) {
      addToPlaylist(t);
      idx = playlist.length - 1;
    }
    playIndex(idx);
  });
  return card;
};

const fetchPage = async () => {
  if (loading || exhausted) return;
  loading = true;
  more.disabled = true;
  stateEl.textContent = grid.children.length ? '' : 'Loading…';
  stateEl.style.display = grid.children.length ? 'none' : 'block';
  const params = new URLSearchParams();
  if (genreSel.value) params.set('genre', genreSel.value);
  if (cursor) params.set('before', String(cursor));
  // Pull a wider page when search is active so there's enough to
  // filter against without forcing the user to click "load more"
  // until they find a match.
  params.set('limit', search.value ? '100' : '24');
  try {
    const r = await fetch(`/api/feed?${params}`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const tracks = await r.json();
    if (tracks.length === 0 && !grid.children.length) {
      stateEl.textContent = 'No tracks yet. Generate something on the main page and click Share.';
      stateEl.style.display = 'block';
      exhausted = true;
      more.hidden = true;
      return;
    }
    const q = search.value.trim().toLowerCase();
    const matched = q ? tracks.filter(t => matchesSearch(t, q)) : tracks;
    for (const t of matched) grid.appendChild(renderCard(t));
    if (tracks.length === 0) {
      exhausted = true;
      more.hidden = true;
      stateEl.textContent = `${grid.children.length} tracks · end of feed`;
      stateEl.className = 'end';
      stateEl.style.display = 'block';
    } else {
      cursor = tracks[tracks.length - 1].renderedAt;
      more.hidden = false;
      stateEl.style.display = 'none';
    }
    syncCardAddButtons();
    syncCardBookmarkButtons();
    syncCardPlayButtons();
  } catch (err) {
    stateEl.textContent = `Failed to load: ${err.message}`;
    stateEl.style.display = 'block';
  } finally {
    loading = false;
    more.disabled = false;
  }
};

const reset = () => {
  grid.innerHTML = '';
  cursor = 0;
  exhausted = false;
  more.hidden = true;
  fetchPage();
};

genreSel.addEventListener('change', () => {
  const u = new URL(location.href);
  if (genreSel.value) u.searchParams.set('genre', genreSel.value);
  else u.searchParams.delete('genre');
  history.replaceState(null, '', u);
  reset();
});

// Debounce search so typing doesn't refetch on every keystroke.
let searchTimer = null;
search.addEventListener('input', () => {
  if (searchTimer) clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    const u = new URL(location.href);
    if (search.value) u.searchParams.set('q', search.value);
    else u.searchParams.delete('q');
    history.replaceState(null, '', u);
    reset();
  }, 250);
});

more.addEventListener('click', fetchPage);

// ----- Webamp (vendored Winamp 2.9 clone) -----
//
// Loaded on demand the first time the user clicks "webamp" so the
// ~920 KB bundle doesn't hit every feed-page visitor. Webamp's UMD
// build exposes a global Webamp constructor; we hand it the current
// playlist as `initialTracks`. The site's plain <audio> playlist
// keeps running in parallel — this is an alternative chrome, not a
// replacement.
let webampInstance = null;
let webampLoading = null;
const loadWebamp = () => {
  if (window.Webamp) return Promise.resolve(window.Webamp);
  if (webampLoading) return webampLoading;
  webampLoading = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = '/vendor/webamp/webamp.bundle.min.js'; // see public/vendor/NOTICE.md
    s.onload = () => resolve(window.Webamp);
    s.onerror = () => reject(new Error('webamp bundle failed to load'));
    document.head.appendChild(s);
  });
  return webampLoading;
};

const openWebamp = async () => {
  try {
    const Webamp = await loadWebamp();
    if (!Webamp) throw new Error('Webamp constructor missing');
    if (webampInstance) {
      // Already open — just refresh the queue from the live playlist.
      const tracks = playlist.map(toWebampTrack);
      // Webamp lacks a "replace queue" API; closest is appendTracks.
      // For UX consistency we close + reopen so the user gets a
      // clean state matching what they currently see in the sidebar.
      try { webampInstance.dispose(); } catch {}
      webampInstance = null;
    }
    if (playlist.length === 0) {
      alert('Playlist is empty — add some tracks first.');
      return;
    }
    // Dock the Webamp window stack to the left edge, just below the
    // header — same gravity as the sidebar player it's replacing.
    // Each Webamp window is 275 px wide; positioning all three from
    // x:0 stacks them vertically against the left rail. Users can
    // drag them around afterward (it's still Webamp), but the open
    // state lands somewhere predictable.
    const headerH = document.querySelector('header')?.offsetHeight ?? 64;
    webampInstance = new Webamp({
      initialTracks: playlist.map(toWebampTrack),
      // Default skin (Winamp 2.9 stock). Custom .wsz support is one
      // option flag away if we ship a skin chooser later.
      initialState: {
        windowLayout: {
          main:      { position: { x: 0, y: headerH + 8 } },
          equalizer: { position: { x: 0, y: headerH + 8 + 116 } },
          playlist:  { position: { x: 0, y: headerH + 8 + 232 }, size: [0, 4] },
        },
      },
    });
    // Pause the site's <audio> when Webamp opens — same reason the
    // welcome card auto-pauses Tone.js when its embedded audio
    // plays. Two streams of the same track is jarring.
    audioEl.pause();
    // Hide the built-in sidebar player while Webamp owns the room.
    // The user explicitly switched chrome — running both would
    // double up the transport and confuse "which one am I controlling".
    layout.dataset.webamp = 'open';
    toggleBtn.dataset.active = 'false';  // un-glow the playlist toggle
    await webampInstance.renderWhenReady(document.getElementById('webamp-mount'));
    webampInstance.onClose(() => {
      try { webampInstance?.dispose(); } catch {}
      webampInstance = null;
      // Restore whatever sidebar state was active before Webamp
      // opened — read from localStorage rather than caching at open
      // time so a clear-during-Webamp doesn't ghost the sidebar back
      // into existence with stale tracks.
      delete layout.dataset.webamp;
      const wasOpen = localStorage.getItem(PL_OPEN_KEY) === '1' || playlist.length > 0;
      setPaneOpen(wasOpen);
    });
  } catch (err) {
    alert(`Couldn't open Webamp: ${err.message}`);
  }
};

const toWebampTrack = (t) => ({
  metaData: {
    artist: 'beats.bitwrap.io',
    title:  trackTitle(t),
    album:  t.genre || 'beats.bitwrap.io',
  },
  url: `${location.origin}/audio/${encodeURIComponent(t.cid)}.webm`,
});

// Webamp is built around 275px draggable windows with mouse-sized
// hit targets — usable on a tablet, hostile on a phone. Hide the
// button entirely on narrow touch viewports rather than ship a
// frustrated user. Detection mirrors the synth view's mobile gate.
const isTouchDevice = ('ontouchstart' in window)
    || (navigator.maxTouchPoints > 0)
    || !!navigator.userAgentData?.mobile;
const isNarrowViewport = window.innerWidth < 720;
const webampBtn = document.getElementById('toggle-wa');
if (isTouchDevice && isNarrowViewport) {
    webampBtn.hidden = true;
} else {
    webampBtn.addEventListener('click', openWebamp);
}

renderPlaylist();
fetchPage();

// Confirmation modal — when /feed?cid=… is the URL the user
// arrived on (typically from the synth view's "open in player" /
// the mobile welcome card redirect), pop the same share-card SVG
// they just dismissed so it's clear they landed on the right
// thing. The modal's "Play" button auto-jumps to the track in the
// playlist (adding if needed); "Open in editor" routes back to
// the synth view if they want the full controls. Closes on Esc /
// backdrop / × button.
(function showArrivalCardModal() {
  const cid = new URLSearchParams(location.search).get('cid');
  if (!cid) return;
  const modal = document.getElementById('card-modal');
  const art = modal.querySelector('.card-modal-art');
  const titleEl = modal.querySelector('.card-modal-title');
  const subEl = modal.querySelector('.card-modal-sub');
  const playBtn2 = modal.querySelector('.card-modal-play');
  const editorLink = modal.querySelector('.card-modal-open');
  // Resolve metadata from the local playlist first (the redirect
  // path always pre-populates this entry); fall back to a quick
  // /api/audio-status hit for ad-hoc bookmark visits.
  const fromList = playlist.find(p => p.cid === cid);
  const setMeta = (t) => {
    titleEl.textContent = trackTitle(t || { cid });
    subEl.textContent = [t?.genre, t?.tempo ? `${t.tempo} BPM` : '']
      .filter(Boolean).join(' · ') || 'Confirm and play';
  };
  setMeta(fromList);
  art.src = `/share-card/${encodeURIComponent(cid)}.svg`;
  editorLink.href = `/?cid=${encodeURIComponent(cid)}`;
  modal.hidden = false;
  const close = () => { modal.hidden = true; };
  modal.querySelector('.card-modal-close').addEventListener('click', close);
  modal.addEventListener('click', (e) => { if (e.target === modal) close(); });
  document.addEventListener('keydown', (e) => {
    if (!modal.hidden && e.key === 'Escape') close();
  });
  playBtn2.addEventListener('click', () => {
    let idx = playlist.findIndex(p => p.cid === cid);
    if (idx < 0) {
      addToPlaylist(fromList || { cid, name: '', genre: '', tempo: 0, seed: 0 });
      idx = playlist.length - 1;
    }
    close();
    playIndex(idx);
  });
})();

// Restore last-played position from a previous session. Browsers
// block autoplay without a user gesture, so we just queue the
// track + seek; the user has to press play. The time-position
// applies once metadata has loaded so we know the duration.
try {
  const saved = JSON.parse(localStorage.getItem(PL_STATE_KEY) || 'null');
  if (saved && playlist.length > 0
      && Number.isInteger(saved.idx)
      && saved.idx >= 0 && saved.idx < playlist.length) {
    current = saved.idx;
    if (saved.position > 0) {
      audioEl.addEventListener('loadedmetadata', () => {
        try { audioEl.currentTime = saved.position; } catch {}
      }, { once: true });
    }
    loadCurrent(false);
  }
} catch {}
</script>
</body>
</html>
